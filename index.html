<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Start Button Example</title>
</head>
<body>
    <!-- Nút Start -->
    <button id="startButton">Start</button>

    <!-- JavaScript -->
    <script>
        // Lấy nút theo id
        const button = document.getElementById("startButton");

        // Thêm sự kiện click
        button.addEventListener("click", function() {
            alert("Bạn vừa nhấn nút Start!");
        });
    </script>
</body>
</html>
